<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Working Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        
        .message-bubble {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #emoji-picker-container {
            position: absolute;
            bottom: 90px;
            left: 20px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        
        .emoji-close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .emoji-close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .emoji-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .emoji-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="bg-black/20 backdrop-blur-lg border-b border-white/10 px-6 py-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white">Rentiva Assistant</h1>
                <div class="text-xs text-green-400">AI • Online</div>
            </div>
        </div>
    </header>

    <!-- Chat Container -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-6">
        <div class="flex flex-col items-center justify-center py-10 opacity-50">
            <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4">
                <i class="fas fa-robot text-2xl text-slate-400"></i>
            </div>
            <p class="text-sm text-slate-400">Welcome to Rentiva Chat! 🚀</p>
            <p class="text-xs text-slate-500 mt-2">Type a message to start chatting with AI</p>
        </div>
    </main>

    <!-- Emoji Picker -->
    <div id="emoji-picker-container" style="display: none;">
        <div class="emoji-close-btn" onclick="closeEmojiPicker()">
            <i class="fas fa-times text-xs"></i>
        </div>
        
        <!-- Fallback Emojis -->
        <div class="fallback-emojis">
            <div class="text-xs text-slate-400 mb-2">Quick Emojis:</div>
            <div class="grid grid-cols-8 gap-1">
                <button onclick="addEmoji('😊')" class="emoji-btn">😊</button>
                <button onclick="addEmoji('😂')" class="emoji-btn">😂</button>
                <button onclick="addEmoji('❤️')" class="emoji-btn">❤️</button>
                <button onclick="addEmoji('👍')" class="emoji-btn">👍</button>
                <button onclick="addEmoji('🎉')" class="emoji-btn">🎉</button>
                <button onclick="addEmoji('🔥')" class="emoji-btn">🔥</button>
                <button onclick="addEmoji('💯')" class="emoji-btn">💯</button>
                <button onclick="addEmoji('🚀')" class="emoji-btn">🚀</button>
                <button onclick="addEmoji('🏠')" class="emoji-btn">🏠</button>
                <button onclick="addEmoji('💰')" class="emoji-btn">💰</button>
                <button onclick="addEmoji('📊')" class="emoji-btn">📊</button>
                <button onclick="addEmoji('🧾')" class="emoji-btn">🧾</button>
                <button onclick="addEmoji('👥')" class="emoji-btn">👥</button>
                <button onclick="addEmoji('📱')" class="emoji-btn">📱</button>
                <button onclick="addEmoji('🔔')" class="emoji-btn">🔔</button>
                <button onclick="addEmoji('🔒')" class="emoji-btn">🔒</button>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <footer class="bg-black/20 backdrop-blur-lg border-t border-white/10 p-4">
        <form id="chat-form" class="max-w-4xl mx-auto flex items-end gap-3">
            <div class="flex-1 flex gap-2">
                <div class="relative bg-black/20 rounded-3xl border border-white/10 p-1.5 flex items-center">
                    <textarea id="message-input" rows="1" placeholder="Type your message..."
                        class="w-full bg-transparent border-0 px-4 py-3 outline-none text-white placeholder-slate-500 resize-none max-h-32 rounded-2xl"></textarea>
                    
                    <div class="flex items-center gap-1 px-2">
                        <button type="button" id="emoji-btn"
                            class="w-9 h-9 rounded-full hover:bg-white/10 text-slate-400 hover:text-indigo-400 transition-colors flex items-center justify-center"
                            title="Add emoji">
                            <i class="far fa-face-smile text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="submit" id="send-btn" disabled
                class="bg-gradient-to-tr from-indigo-600 to-purple-600 text-white w-14 h-14 rounded-full shadow-lg hover:shadow-indigo-600/50 hover:scale-105 active:scale-95 disabled:opacity-50 disabled:scale-100 transition-all flex items-center justify-center"
                title="Send message">
                <i class="fas fa-paper-plane text-lg"></i>
            </button>
        </form>
    </footer>

    <script>
        // SIMPLE WORKING CHAT - GUARANTEED TO WORK
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Simple chat loaded!');
            
            // Get elements
            const messageInput = document.getElementById('message-input');
            const chatForm = document.getElementById('chat-form');
            const sendBtn = document.getElementById('send-btn');
            const emojiBtn = document.getElementById('emoji-btn');
            const emojiPicker = document.getElementById('emoji-picker-container');
            const chatContainer = document.getElementById('chat-container');
            
            console.log('Elements found:', {
                messageInput: !!messageInput,
                chatForm: !!chatForm,
                sendBtn: !!sendBtn,
                emojiBtn: !!emojiBtn,
                emojiPicker: !!emojiPicker,
                chatContainer: !!chatContainer
            });
            
            // SEND BUTTON FUNCTIONALITY
            if (sendBtn && chatForm && messageInput) {
                // Enable/disable send button
                messageInput.addEventListener('input', function() {
                    sendBtn.disabled = !this.value.trim();
                    console.log('Send button state:', { disabled: sendBtn.disabled, hasText: !!this.value.trim() });
                });
                
                // Form submission
                chatForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const text = messageInput.value.trim();
                    if (!text) return;
                    
                    console.log('SENDING MESSAGE:', text);
                    
                    // Clear input
                    messageInput.value = '';
                    sendBtn.disabled = true;
                    
                    // Clear welcome message
                    if (chatContainer.querySelector('.opacity-50')) {
                        chatContainer.innerHTML = '';
                    }
                    
                    // Add user message
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'flex flex-col mb-6 items-end message-bubble';
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    messageDiv.innerHTML = `
                        <div class="flex items-end gap-2 max-w-[85%] flex-row-reverse">
                            <div class="bg-blue-600 text-white rounded-2xl px-4 py-2 max-w-full">
                                <p class="break-words">${text}</p>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[10px] opacity-70">${time}</span>
                                    <i class="fas fa-check text-[10px] opacity-70"></i>
                                </div>
                            </div>
                        </div>
                    `;
                    chatContainer.appendChild(messageDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    
                    // AI response
                    setTimeout(() => {
                        const aiDiv = document.createElement('div');
                        aiDiv.className = 'flex flex-col mb-6 items-start message-bubble';
                        const aiTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        aiDiv.innerHTML = `
                            <div class="flex items-end gap-2 max-w-[85%]">
                                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-fuchsia-500 to-pink-500 flex items-center justify-center text-xs font-bold shadow-lg">
                                    <i class="fas fa-robot"></i>
                                </div>
                                <div class="bg-gray-700 text-white rounded-2xl px-4 py-2 max-w-full">
                                    <p class="break-words">Hello! I'm Rentiva AI. I received your message: "${text}"</p>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="text-[10px] opacity-70">${aiTime}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        chatContainer.appendChild(aiDiv);
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }, 1000);
                });
                
                console.log('✅ SEND BUTTON WORKING!');
            }
            
            // EMOJI BUTTON FUNCTIONALITY
            if (emojiBtn && emojiPicker) {
                emojiBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('EMOJI BUTTON CLICKED!');
                    
                    const isVisible = emojiPicker.style.display === 'block';
                    emojiPicker.style.display = isVisible ? 'none' : 'block';
                    console.log('Emoji picker toggled:', !isVisible);
                });
                
                // Close emoji picker
                window.closeEmojiPicker = function() {
                    emojiPicker.style.display = 'none';
                    console.log('Emoji picker closed');
                };
                
                // Add emoji function
                window.addEmoji = function(emoji) {
                    console.log('Adding emoji:', emoji);
                    if (messageInput) {
                        messageInput.value += emoji;
                        messageInput.focus();
                        closeEmojiPicker();
                        // Update send button
                        sendBtn.disabled = !messageInput.value.trim();
                    }
                };
                
                // Click outside to close
                document.addEventListener('click', function(e) {
                    if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
                        emojiPicker.style.display = 'none';
                    }
                });
                
                console.log('✅ EMOJI BUTTON WORKING!');
            }
            
            // Initial state
            if (sendBtn) {
                sendBtn.disabled = true;
            }
            
            console.log('Simple chat initialization completed!');
        });
    </script>
</body>
</html>
