<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentiva Galaxy Chat - Working</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // Gemini AI Initialization
        const GEMINI_API_KEY = "AIzaSyDXUC2_zvAF5dPqz8OyKL-jGaR2493SGrA";
        const genAI = new GoogleGenerativeAI(GEMINI_API_KEY);
        const model = genAI.getGenerativeModel({
            model: "gemini-1.5-flash",
            systemInstruction: "You are RENTIVA AI, a professional property management assistant. You help owners and tenants with rent calculation, payment tracking, property management advice, and rental agreements. Be helpful, professional, and concise. Always refer to the RENTIVA.ai platform and its features like automated receipts, predictive maintenance, and real-time dashboard."
        });

        let currentUser = null;

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Chat initialization started...');
            
            // Get elements
            const messageInput = document.getElementById('message-input');
            const chatForm = document.getElementById('chat-form');
            const sendBtn = document.getElementById('send-btn');
            const emojiBtn = document.getElementById('emoji-btn');
            const emojiPicker = document.getElementById('emoji-picker-container');
            
            console.log('Elements found:', {
                messageInput: !!messageInput,
                chatForm: !!chatForm,
                sendBtn: !!sendBtn,
                emojiBtn: !!emojiBtn,
                emojiPicker: !!emojiPicker
            });

            // Initialize send button state
            if (sendBtn) {
                sendBtn.disabled = true;
            }

            // Send button functionality
            function updateSendButton() {
                if (sendBtn && messageInput) {
                    const hasText = messageInput.value.trim().length > 0;
                    sendBtn.disabled = !hasText;
                    console.log('Send button state:', { hasText, disabled: sendBtn.disabled });
                }
            }

            // Input event listener
            if (messageInput) {
                messageInput.addEventListener('input', function() {
                    updateSendButton();
                });
            }

            // Form submission
            if (chatForm) {
                chatForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const text = messageInput.value.trim();
                    if (!text) return;

                    console.log('Sending message:', text);

                    // Clear input
                    messageInput.value = '';
                    updateSendButton();

                    // Add user message
                    addMessageToChat('You', 'user', text);

                    // Get AI response
                    try {
                        const response = await model.generateContent(text);
                        const aiText = response.response.text();
                        addMessageToChat('Rentiva AI', 'bot', aiText);
                    } catch (error) {
                        console.error('AI error:', error);
                        const fallbackResponse = getFallbackResponse(text);
                        addMessageToChat('Rentiva AI', 'bot', fallbackResponse);
                    }
                });
            }

            // Emoji button functionality
            if (emojiBtn) {
                emojiBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Emoji button clicked!');
                    
                    if (emojiPicker) {
                        const isVisible = emojiPicker.style.display === 'block';
                        emojiPicker.style.display = 'block';
                        console.log('Emoji picker opened');
                        
                        // Show fallback emojis if main picker doesn't load
                        setTimeout(() => {
                            const picker = document.querySelector('emoji-picker');
                            if (!picker || picker.offsetHeight === 0) {
                                console.log('Showing fallback emojis');
                                document.getElementById('fallback-emojis').style.display = 'block';
                            }
                        }, 100);
                    }
                });
            }

            // Close emoji picker
            window.closeEmojiPicker = function() {
                if (emojiPicker) {
                    emojiPicker.style.display = 'none';
                }
            };

            // Add emoji function
            window.addEmoji = function(emoji) {
                if (messageInput) {
                    const cursorPosition = messageInput.selectionStart || messageInput.value.length;
                    const textBefore = messageInput.value.substring(0, cursorPosition);
                    const textAfter = messageInput.value.substring(cursorPosition);
                    messageInput.value = textBefore + emoji + textAfter;
                    messageInput.focus();
                    closeEmojiPicker();
                    updateSendButton();
                }
            };

            // Click outside to close emoji picker
            document.addEventListener('click', function(e) {
                if (emojiPicker && !emojiPicker.contains(e.target) && e.target !== emojiBtn) {
                    emojiPicker.style.display = 'none';
                }
            });

            // Add welcome message
            const chatContainer = document.getElementById('chat-container');
            if (chatContainer) {
                chatContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 opacity-50">
                        <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4">
                            <i class="fas fa-robot text-2xl text-slate-400"></i>
                        </div>
                        <p class="text-sm text-slate-400">Welcome to Rentiva Galaxy Chat! 🚀</p>
                        <p class="text-xs text-slate-500 mt-2">Type a message to start chatting with AI</p>
                    </div>
                `;
            }

            console.log('Chat initialization completed');
        });

        // Add message to chat
        function addMessageToChat(sender, type, text) {
            const chatContainer = document.getElementById('chat-container');
            if (!chatContainer) return;
            
            // Clear welcome message
            if (chatContainer.querySelector('.opacity-50')) {
                chatContainer.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex flex-col mb-6 ${type === 'user' ? 'items-end' : 'items-start'}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="flex items-end gap-2 max-w-[85%] ${type === 'user' ? 'flex-row-reverse' : 'flex-row'}">
                    ${type === 'bot' ? `
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-fuchsia-500 to-pink-500 flex items-center justify-center text-xs font-bold shadow-lg">
                            <i class="fas fa-robot"></i>
                        </div>
                    ` : ''}
                    <div class="${type === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-white'} rounded-2xl px-4 py-2 max-w-full">
                        <p class="break-words">${text.replace(/\n/g, '<br>')}</p>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[10px] opacity-70">${time}</span>
                            ${type === 'user' ? '<i class="fas fa-check text-[10px] opacity-70"></i>' : ''}
                        </div>
                    </div>
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Fallback response function
        function getFallbackResponse(message) {
            const lowerMessage = message.toLowerCase();
            
            if (lowerMessage.includes('hello') || lowerMessage.includes('hi')) {
                return 'Hello! I\'m Rentiva AI, your property management assistant. How can I help you today? 🏠';
            }
            
            if (lowerMessage.includes('rent')) {
                return 'For rent calculation: Base Rent + (Electricity Units × ₹10) + Water Charges = Total Rent. The Owner Portal automates this for you! 📊';
            }
            
            if (lowerMessage.includes('tenant')) {
                return 'Manage tenants efficiently! Add details, track payments, generate receipts, and send notifications - all in one dashboard. 👥';
            }
            
            if (lowerMessage.includes('receipt')) {
                return 'Generate professional PDF receipts instantly! Include property details, rent breakdown, and payment status. All receipts are saved automatically! 🧾';
            }
            
            return 'I\'m here to help with property management! Try asking about rent calculation, tenant management, or receipt generation. 🏠';
        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .message-bubble {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #emoji-picker-container {
            position: absolute;
            bottom: 90px;
            left: 20px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .emoji-close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .emoji-close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fallback-emojis {
            padding: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 8px;
        }

        .emoji-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }
    </style>
</head>
<body class="flex flex-col h-screen">
    <!-- Stars Background -->
    <div id="stars" class="fixed inset-0 pointer-events-none"></div>

    <!-- Header -->
    <header class="bg-black/20 backdrop-blur-lg border-b border-white/10 px-6 py-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white">Rentiva Assistant</h1>
                <div class="text-xs text-green-400">AI • Online</div>
            </div>
        </div>
    </header>

    <!-- Chat Container -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-6">
        <!-- Messages will appear here -->
    </main>

    <!-- Emoji Picker -->
    <div id="emoji-picker-container" style="display: none;">
        <div class="emoji-close-btn" onclick="closeEmojiPicker()">
            <i class="fas fa-times text-xs"></i>
        </div>
        <emoji-picker class="dark"></emoji-picker>
        
        <!-- Fallback Emojis -->
        <div class="fallback-emojis" id="fallback-emojis" style="display: none;">
            <div class="text-xs text-slate-400 mb-2">Quick Emojis:</div>
            <div class="grid grid-cols-8 gap-1">
                <button onclick="addEmoji('😊')" class="emoji-btn">😊</button>
                <button onclick="addEmoji('😂')" class="emoji-btn">😂</button>
                <button onclick="addEmoji('❤️')" class="emoji-btn">❤️</button>
                <button onclick="addEmoji('👍')" class="emoji-btn">👍</button>
                <button onclick="addEmoji('🎉')" class="emoji-btn">🎉</button>
                <button onclick="addEmoji('🔥')" class="emoji-btn">🔥</button>
                <button onclick="addEmoji('💯')" class="emoji-btn">💯</button>
                <button onclick="addEmoji('🚀')" class="emoji-btn">🚀</button>
                <button onclick="addEmoji('🏠')" class="emoji-btn">🏠</button>
                <button onclick="addEmoji('💰')" class="emoji-btn">💰</button>
                <button onclick="addEmoji('📊')" class="emoji-btn">📊</button>
                <button onclick="addEmoji('🧾')" class="emoji-btn">🧾</button>
                <button onclick="addEmoji('👥')" class="emoji-btn">👥</button>
                <button onclick="addEmoji('📱')" class="emoji-btn">📱</button>
                <button onclick="addEmoji('🔔')" class="emoji-btn">🔔</button>
                <button onclick="addEmoji('🔒')" class="emoji-btn">🔒</button>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <footer class="bg-black/20 backdrop-blur-lg border-t border-white/10 p-4">
        <form id="chat-form" class="max-w-4xl mx-auto flex items-end gap-3">
            <div class="flex-1 flex gap-2">
                <div class="relative bg-black/20 rounded-3xl border border-white/10 p-1.5 flex items-center">
                    <textarea id="message-input" rows="1" placeholder="Type your message..."
                        class="w-full bg-transparent border-0 px-4 py-3 outline-none text-white placeholder-slate-500 resize-none max-h-32 rounded-2xl"></textarea>
                    
                    <div class="flex items-center gap-1 px-2">
                        <button type="button" id="emoji-btn"
                            class="w-9 h-9 rounded-full hover:bg-white/10 text-slate-400 hover:text-indigo-400 transition-colors flex items-center justify-center"
                            title="Add emoji">
                            <i class="far fa-face-smile text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="submit" id="send-btn" disabled
                class="bg-gradient-to-tr from-indigo-600 to-purple-600 text-white w-14 h-14 rounded-full shadow-lg hover:shadow-indigo-600/50 hover:scale-105 active:scale-95 disabled:opacity-50 disabled:scale-100 transition-all flex items-center justify-center"
                title="Send message">
                <i class="fas fa-paper-plane text-lg"></i>
            </button>
        </form>
    </footer>

    <!-- Emoji Picker Script -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>

    <script>
        // Add stars animation
        function buildStars() {
            const container = document.getElementById('stars');
            if (!container) return;
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'absolute rounded-full bg-white';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.opacity = Math.random() * 0.8 + 0.2;
                star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite`;
                container.appendChild(star);
            }
        }
        
        buildStars();
        
        // Add twinkle animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes twinkle {
                0%, 100% { opacity: 0.2; }
                50% { opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
